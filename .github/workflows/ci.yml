name: CI

on: [push]

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test (imports)
        run: |
          python -c "import torch, mlflow, numpy; print('imports ok')"

      - name: Run short training (CI Local MLflow store)
        env:
          MLFLOW_TRACKING_URI: "file:./mlruns_ci"
        run: |
          python src/train.py

